                snprintf(buf, sizeof(buf), "!SET_IRDELAY %d\r", (int)x);
                id(${uartid}).write_str(buf);

# ──────────────────────────────────────────────
#  Buttons
# ──────────────────────────────────────────────
button:
  - platform: template
    name: "All Outlets ON"
    icon: "mdi:power-plug"
    on_press:
      - uart.write:
          id: ${uartid}
          data: "!ALL_ON\r"
      - lambda: 'id(fast_poll_count) = 5;'

  - platform: template
    name: "All Outlets OFF"
    icon: "mdi:power-plug-off"
    on_press:
      - uart.write:
          id: ${uartid}
          data: "!ALL_OFF\r"
      - lambda: 'id(fast_poll_count) = 5;'

  - platform: template
    name: "Run UPS Self-Test"
    icon: "mdi:checkbox-marked-circle-outline"
    on_press:
      - uart.write:
          id: ${uartid}
          data: "!UPS_TEST ON\r"

  - platform: template
    name: "Poll All Status"
    icon: "mdi:refresh"
    on_press:
      - lambda: |-
          id(poll_slot) = 0;
          id(fast_poll_count) = 5;

  - platform: template
    name: "Query Config"
    icon: "mdi:cog-outline"
    on_press:
      - uart.write:
          id: ${uartid}
          data: "?LIST_CONFIG\r"

  - platform: template
    name: "Factory Reset UPS Settings"
    icon: "mdi:restore"
    on_press:
      - uart.write:
          id: ${uartid}
          data: "!RESET_ALL\r"

# ──────────────────────────────────────────────
#  Intervals
# ──────────────────────────────────────────────
interval:
  # Normal poll: one query per slot every 10s
  # Slot 0: OUTLETSTAT  1: POWERSTAT   2: BATTERYSTAT
  # Slot 3: LOADSTAT    4: POWER       5: LIST_CONFIG
  - interval: 10s
    then:
      - lambda: |-
          if (!id(boot_complete)) {
            id(boot_ticks) += 1;
            if (id(boot_ticks) < 3) return;
            if (id(bank1_known) && id(bank2_known) &&
                id(bank3_known) && id(bank4_known)) {
              id(boot_complete) = true;
              ESP_LOGI("ups", "Boot complete - controls unlocked");
            }
          }

          const char* queries[] = {
            "?OUTLETSTAT\r",
            "?POWERSTAT\r",
            "?BATTERYSTAT\r",
            "?LOADSTAT\r",
            "?POWER\r",
            "?LIST_CONFIG\r"
          };
          int slot = id(poll_slot) % 6;
          ESP_LOGD("ups", "Poll slot %d: %s", slot, queries[slot]);
          id(${uartid}).write_str(queries[slot]);
          id(poll_slot) = slot + 1;

  # Fast poll after switch commands
  - interval: 2s
    then:
      - lambda: |-
          if (id(fast_poll_count) > 0) {
            ESP_LOGD("ups", "Fast poll remaining: %d", id(fast_poll_count));
            id(${uartid}).write_str("?OUTLETSTAT\r");
            id(fast_poll_count) -= 1;
          }

  # UART reader
  - interval: 500ms
    then:
      - lambda: |-
          auto strip_spaces = [](std::string s) -> std::string {
            s.erase(std::remove(s.begin(), s.end(), ' '), s.end());
            return s;
          };

          auto safe_parse = [](const std::string &s, float &out) -> bool {
            if (s.empty()) return false;
            char *end = nullptr;
            out = strtof(s.c_str(), &end);
            return end != s.c_str();
          };

          auto after_eq = [](const std::string &s) -> std::string {
            auto pos = s.find('=');
            if (pos == std::string::npos) return "";
            return s.substr(pos + 1);
          };

          auto strip_tail = [](std::string s) -> std::string {
            while (!s.empty() &&
                   !isalnum((unsigned char)s.back()) && s.back() != '.')
              s.pop_back();
            return s;
          };

          while (id(${uartid}).available()) {
            uint8_t c;
            id(${uartid}).read_byte(&c);

            if (c == '\r' || c == '\n') {
              if (!id(uart_buf).empty()) {
                std::string line = id(uart_buf);
                id(uart_buf) = "";

                while (!line.empty() &&
                       (line[0]=='$' || line[0]=='>' ||
                        line[0]=='#' || line[0]==' '))
                  line = line.substr(1);

                if (line.empty()) continue;
                if (line[0] == '-') continue;

                ESP_LOGD("ups", "RX: [%s]", line.c_str());

                std::string n = strip_spaces(line);
                float val = 0.0f;
                std::string rhs = strip_tail(after_eq(n));

                // ── Outlet bank states ──────────────────
                if (n.rfind("BANK1=", 0) == 0) {
                  bool on = (rhs == "ON");
                  id(bank1_known) = true;
                  id(bank1_switch).publish_state(on);
                } else if (n.rfind("BANK2=", 0) == 0) {
                  bool on = (rhs == "ON");
                  id(bank2_known) = true;
                  id(bank2_switch).publish_state(on);
                } else if (n.rfind("BANK3=", 0) == 0) {
                  bool on = (rhs == "ON");
                  id(bank3_known) = true;
                  id(bank3_switch).publish_state(on);
                } else if (n.rfind("BANK4=", 0) == 0) {
                  bool on = (rhs == "ON");
                  id(bank4_known) = true;
                  id(bank4_switch).publish_state(on);
                }

                // ── Battery charge % ────────────────────
                else if (n.rfind("BATTERY=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(battery_pct).publish_state(val);
                }

                // ── Load % ──────────────────────────────
                else if (n.rfind("LOAD=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(load_pct).publish_state(val);
                }

                // ── Watts ───────────────────────────────
                else if (n.rfind("WATTS=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(watts_sensor).publish_state(val);
                }

                // ── Input voltage ───────────────────────
                else if (n.rfind("VOLTS_IN=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(volts_in).publish_state(val);
                }

                // ── Output voltage ──────────────────────
                else if (n.rfind("VOLTS_OUT=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(volts_out).publish_state(val);
                }

                // ── Current ─────────────────────────────
                else if (n.rfind("CURRENT=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(current_amps).publish_state(val);
                }

                // ── Power status ────────────────────────
                else if (n.rfind("PWR=", 0) == 0) {
                  id(power_status).publish_state(rhs);
                  id(power_fault).publish_state(rhs != "NORMAL");
                }

                // ── Battery state ───────────────────────
                else if (n.rfind("BATTSTATE=", 0) == 0) {
                  id(batt_state).publish_state(rhs);
                }

                // ── Low battery ─────────────────────────
                else if (n == "LOWBAT") {
                  id(low_battery).publish_state(true);
                }

                // ── Backup time ─────────────────────────
                else if (n.rfind("TIME=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(backup_time).publish_state(val);
                  id(low_battery).publish_state(false);
                }

                // ── AVR stage (unsolicited) ──────────────
                else if (n.rfind("AVRSTATE=", 0) == 0) {
                  id(avr_state).publish_state(rhs);
                }

                // ── LIST_CONFIG responses ────────────────
                else if (n.rfind("AVR=", 0) == 0) {
                  id(avr_mode_select).publish_state(rhs);
                }
                else if (n.rfind("BRIGHTNESS=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(lcd_brightness).publish_state(val);
                }
                else if (n.rfind("SCROLL_MODE=", 0) == 0) {
                  id(scroll_mode_select).publish_state(rhs);
                }
                else if (n.rfind("SLEEP_MODE=", 0) == 0) {
                  id(sleep_mode_select).publish_state(rhs);
                }
                else if (n.rfind("NORMALVOLT=", 0) == 0) {
                  id(normal_voltage_select).publish_state(rhs);
                }
                else if (n.rfind("BUZZER=", 0) == 0) {
                  id(buzzer_switch).publish_state(rhs == "ON");
                }
                else if (n.rfind("BTHRESH3=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(bank3_threshold).publish_state(val);
                }
                else if (n.rfind("BTHRESH4=", 0) == 0) {
                  if (safe_parse(rhs, val)) id(bank4_threshold).publish_state(val);
                }
                else if (n.rfind("BTHRESH=", 0) == 0) {
                  if (safe_parse(rhs, val)) {
                    id(bank3_threshold).publish_state(val);
                    id(bank4_threshold).publish_state(val);
                  }
                }

                // ── Unmatched ───────────────────────────
                else {
                  ESP_LOGW("ups", "UNMATCHED: [%s]", n.c_str());
                }
              }
            } else {
              id(uart_buf) += (char)c;
              if (id(uart_buf).size() > 64) id(uart_buf) = "";
            }
          }
