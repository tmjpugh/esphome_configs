# ESPdevice: ESP-WROOM-32 ESP-32S 
# TTL to RS232: MAX3232

substitutions:
  name: furman1500ups
  friendly_name: "Furman F1500-UPS"
  use_address: <ip on your LAN>
  uartid: ups_bus
  txpin: "17"
  rxpin: "16"
  baudrate: "9600"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: 600
    then:
      - lambda: |-
          id(boot_complete) = false;
          id(bank1_known) = false;
          id(bank2_known) = false;
          id(bank3_known) = false;
          id(bank4_known) = false;
          id(fast_poll_count) = 0;

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_secure
  password: !secret wifipass_secure
  use_address: ${use_address}

web_server:
  port: 80

uart:
  id: ${uartid}
  tx_pin: ${txpin}
  rx_pin: ${rxpin}
  baud_rate: ${baudrate}
  data_bits: 8
  stop_bits: 1
  parity: NONE

globals:
  - id: uart_buf
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: boot_complete
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bank1_known
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bank2_known
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bank3_known
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: bank4_known
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: poll_slot
    type: int
    restore_value: false
    initial_value: '0'
  - id: boot_ticks
    type: int
    restore_value: false
    initial_value: '0'
  - id: fast_poll_count
    type: int
    restore_value: false
    initial_value: '0'

# ──────────────────────────────────────────────
#  Numeric sensors
# ──────────────────────────────────────────────
sensor:
  - platform: template
    id: battery_pct
    name: "Battery Charge"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    device_class: battery
    state_class: measurement
    icon: "mdi:battery"
    update_interval: never

  - platform: template
    id: load_pct
    name: "Load Level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    state_class: measurement
    icon: "mdi:gauge"
    update_interval: never

  - platform: template
    id: watts_sensor
    name: "Output Power"
    unit_of_measurement: "W"
    accuracy_decimals: 0
    device_class: power
    state_class: measurement
    update_interval: never

  - platform: template
    id: volts_in
    name: "Input Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 0
    device_class: voltage
    state_class: measurement
    update_interval: never

  - platform: template
    id: volts_out
    name: "Output Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 0
    device_class: voltage
    state_class: measurement
    update_interval: never

  - platform: template
    id: current_amps
    name: "Output Current"
    unit_of_measurement: "A"
    accuracy_decimals: 1
    device_class: current
    state_class: measurement
    update_interval: never

  - platform: template
    id: backup_time
    name: "Estimated Backup Time"
    unit_of_measurement: "min"
    accuracy_decimals: 0
    icon: "mdi:timer-outline"
    state_class: measurement
    update_interval: never

# ──────────────────────────────────────────────
#  Text sensors
# ──────────────────────────────────────────────
text_sensor:
  - platform: template
    id: power_status
    name: "UPS Power Status"
    icon: "mdi:lightning-bolt"
    update_interval: never

  - platform: template
    id: batt_state
    name: "Battery State"
    icon: "mdi:battery-charging"
    update_interval: never

  - platform: template
    id: avr_state
    name: "AVR Stage"
    icon: "mdi:sine-wave"
    update_interval: never

# ──────────────────────────────────────────────
#  Binary sensors
# ──────────────────────────────────────────────
binary_sensor:
  - platform: template
    id: power_fault
    name: "Power Fault"
    device_class: problem
    lambda: 'return {};'

  - platform: template
    id: low_battery
    name: "Low Battery"
    device_class: battery
    lambda: 'return {};'

# ──────────────────────────────────────────────
#  Switches
# ──────────────────────────────────────────────
switch:
  - platform: template
    id: bank1_switch
    name: "Bank 1 (Critical)"
    icon: "mdi:power-socket"
    optimistic: false
    restore_mode: DISABLED
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank1_known);'
          then:
            - logger.log: "CMD: SWITCH 1 ON"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 1 ON\r"
            - lambda: 'id(fast_poll_count) = 5;'
    turn_off_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank1_known);'
          then:
            - logger.log: "CMD: SWITCH 1 OFF"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 1 OFF\r"
            - lambda: 'id(fast_poll_count) = 5;'

  - platform: template
    id: bank2_switch
    name: "Bank 2 (Critical)"
    icon: "mdi:power-socket"
    optimistic: false
    restore_mode: DISABLED
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank2_known);'
          then:
            - logger.log: "CMD: SWITCH 2 ON"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 2 ON\r"
            - lambda: 'id(fast_poll_count) = 5;'
    turn_off_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank2_known);'
          then:
            - logger.log: "CMD: SWITCH 2 OFF"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 2 OFF\r"
            - lambda: 'id(fast_poll_count) = 5;'

  - platform: template
    id: bank3_switch
    name: "Bank 3 (Non-Critical)"
    icon: "mdi:power-socket-outline"
    optimistic: false
    restore_mode: DISABLED
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank3_known);'
          then:
            - logger.log: "CMD: SWITCH 3 ON"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 3 ON\r"
            - lambda: 'id(fast_poll_count) = 5;'
    turn_off_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank3_known);'
          then:
            - logger.log: "CMD: SWITCH 3 OFF"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 3 OFF\r"
            - lambda: 'id(fast_poll_count) = 5;'

  - platform: template
    id: bank4_switch
    name: "Bank 4 (Non-Critical)"
    icon: "mdi:power-socket-outline"
    optimistic: false
    restore_mode: DISABLED
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank4_known);'
          then:
            - logger.log: "CMD: SWITCH 4 ON"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 4 ON\r"
            - lambda: 'id(fast_poll_count) = 5;'
    turn_off_action:
      - if:
          condition:
            lambda: 'return id(boot_complete) && id(bank4_known);'
          then:
            - logger.log: "CMD: SWITCH 4 OFF"
            - uart.write:
                id: ${uartid}
                data: "!SWITCH 4 OFF\r"
            - lambda: 'id(fast_poll_count) = 5;'

  - platform: template
    id: buzzer_switch
    name: "UPS Buzzer"
    icon: "mdi:bell-outline"
    optimistic: true
    restore_mode: DISABLED
    turn_on_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - uart.write:
                id: ${uartid}
                data: "!SET_BUZZER ON\r"
    turn_off_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - uart.write:
                id: ${uartid}
                data: "!SET_BUZZER OFF\r"

# ──────────────────────────────────────────────
#  Select — populated by ?LIST_CONFIG
#  set_action uses lambda + write_str to avoid
#  std::string vs vector<uint8_t> type error
# ──────────────────────────────────────────────
select:
  - platform: template
    id: avr_mode_select
    name: "AVR Mode"
    icon: "mdi:sine-wave"
    optimistic: true
    restore_value: false
    options:
      - "OFF"
      - "STANDARD"
      - "SENSITIVE"
    set_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - lambda: |-
                std::string cmd = "!SET_AVR " + x + "\r";
                id(${uartid}).write_str(cmd.c_str());

  - platform: template
    id: scroll_mode_select
    name: "LCD Scroll Mode"
    icon: "mdi:monitor"
    optimistic: true
    restore_value: false
    options:
      - "OFF"
      - "5SEC"
      - "10SEC"
    set_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - lambda: |-
                std::string cmd = "!SET_SCROLLMODE " + x + "\r";
                id(${uartid}).write_str(cmd.c_str());

  - platform: template
    id: sleep_mode_select
    name: "LCD Sleep Mode"
    icon: "mdi:monitor-off"
    optimistic: true
    restore_value: false
    options:
      - "OFF"
      - "30SEC"
      - "60SEC"
    set_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - lambda: |-
                std::string cmd = "!SET_SLEEPMODE " + x + "\r";
                id(${uartid}).write_str(cmd.c_str());

  - platform: template
    id: normal_voltage_select
    name: "Nominal Line Voltage"
    icon: "mdi:lightning-bolt"
    optimistic: true
    restore_value: false
    options:
      - "220"
      - "230"
      - "240"
    set_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - lambda: |-
                std::string cmd = "!SET_NORMALVOLT " + x + "\r";
                id(${uartid}).write_str(cmd.c_str());

# ──────────────────────────────────────────────
#  Numbers — populated by ?LIST_CONFIG
#  set_action uses lambda + write_str
# ──────────────────────────────────────────────
number:
  - platform: template
    id: bank3_threshold
    name: "Bank 3 Shutoff Threshold"
    icon: "mdi:battery-alert"
    optimistic: true
    restore_value: false
    min_value: 20
    max_value: 90
    step: 10
    unit_of_measurement: "%"
    mode: slider
    set_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - lambda: |-
                char buf[32];
                snprintf(buf, sizeof(buf), "!SET_BATTHRESH 3 %d\r", (int)x);
                id(${uartid}).write_str(buf);

  - platform: template
    id: bank4_threshold
    name: "Bank 4 Shutoff Threshold"
    icon: "mdi:battery-alert"
    optimistic: true
    restore_value: false
    min_value: 20
    max_value: 90
    step: 10
    unit_of_measurement: "%"
    mode: slider
    set_action:
      - if:
          condition:
            lambda: 'return id(boot_complete);'
          then:
            - lambda: |-
                char buf[32];
                snprintf(buf, sizeof(buf), "!SET_BATTHRESH 4 %d\r", (int)x);
                id(${uartid}).write_str(buf);

  - platform: template
    id: lcd_brightness
